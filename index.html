<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YT Thumbnail · Pro Developing</title>
  <link rel="icon" type="image/png" href="Pro.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Google Fonts (Inter) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --footer-height: 70px;
    }
    html,body{
      height:100%;
    }
    body {
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
      background: #f3f4f6;
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ✅ NEW NAVBAR (blue+orange logo + whatsapp) */
    .new-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(0,0,0,0.02);
      padding: 0.6rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-blue {
      color: #007BFF;
      font-weight: 800;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
    }
    .logo-orange {
      color: #FF6F00;
      font-weight: 800;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
    }
    .whatsapp-nav {
      background-color: #25D366;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.8rem;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      box-shadow: 0 6px 12px rgba(37,211,102,0.2);
      text-decoration: none;
    }
    .whatsapp-nav:hover {
      transform: scale(1.12);
      box-shadow: 0 10px 18px rgba(37,211,102,0.35);
    }

    /* Popup (center) */
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.98);
      background: #111827;
      color: #fff;
      padding: 14px 20px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(2,6,23,0.4);
      display: none;
      z-index: 9999;
      text-align: center;
      animation: popupIn 250ms ease;
      max-width: 90%;
    }
    @keyframes popupIn {
      from { opacity: 0; transform: translate(-50%, -55%) scale(0.98); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* Loader bars */
    .bars {
      display:flex;
      gap:6px;
      align-items:center;
      height:60px;
      justify-content:center;
    }
    .bar {
      width:6px;
      background:#38bdf8;
      border-radius:3px;
      animation:pulse 1s ease-in-out infinite;
      animation-delay: calc(var(--i) * 0.1s);
      transform-origin:center;
    }
    @keyframes pulse {
      0%,100%{ height:10px; }
      50%{ height:50px; }
    }

    /* Main container (centered card) with spacing for fixed navbar */
    .card {
      max-width: 520px;
      margin: 110px auto 24px; /* leave space for fixed navbar */
      background: #ffffff;
      padding: 24px 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(2,6,23,0.08);
      text-align: center;
    }

    input[type="text"], select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus, select:focus {
      border-color: #007BFF;
    }

    /* ✅ NEW GRADIENT BUTTON (blue🟠orange) */
    .btn-gradient {
      display: inline-block;
      width: 100%;
      background: linear-gradient(145deg, #007BFF, #FF6F00);
      background-size: 150% auto;
      color: white;
      padding: 12px 16px;
      border-radius: 60px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 8px 18px rgba(0, 123, 255, 0.25);
      transition: all 0.3s ease;
      text-align: center;
    }
    .btn-gradient:hover {
      background-position: right center;
      transform: translateY(-4px);
      box-shadow: 0 16px 26px rgba(255, 111, 0, 0.3);
    }

    /* ✅ FOOTER: fixed bottom, exactly "Design by Pro Developing" (yellow) */
    footer.fixed-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--footer-height);
      background: #0f172a; /* deep dark */
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 0 16px;
      box-shadow: 0 -4px 20px rgba(2,6,23,0.12);
    }
    .design-footer {
      color: #94a3b8; /* soft gray */
      font-size: 1rem;
      font-weight: 400;
    }
    .design-footer .yellow-highlight {
      color: #fbbf24; /* vibrant yellow */
      font-weight: 700;
    }

    /* small helper */
    .header-spacer { height: 64px; }
  </style>
</head>
<body>

  <!-- ✅ NEW NAVBAR (Pro blue + Developing orange) with WhatsApp icon -->
  <nav class="new-nav">
    <div class="flex items-center">
      <span class="logo-blue">Pro</span>
      <span class="logo-orange">Developing</span>
    </div>
    <a id="waTop" class="whatsapp-nav" href="#" title="Chat on WhatsApp">
      <i class="fa-brands fa-whatsapp"></i>
    </a>
  </nav>

  <!-- page wrapper to ensure footer spacing (no extra padding needed, footer fixed) -->
  <div style="padding-bottom: var(--footer-height); width:100%;">
    <div class="header-spacer"></div>

    <!-- MAIN CARD -->
    <div class="card">
      <h1 class="text-xl font-bold mb-3" style="color:#1e293b;">Download YouTube Thumbnail</h1>

      <input type="text" id="videoUrl" placeholder="Enter YouTube video URL" />
      <select id="quality">
        <option value="maxresdefault">Max Quality</option>
        <option value="hqdefault">High Quality</option>
        <option value="mqdefault">Medium Quality</option>
        <option value="default">Low Quality</option>
      </select> 

      <!-- ✅ GRADIENT BUTTON (replaced old pink) -->
      <button class="btn-gradient" onclick="downloadThumbnail()">Download</button>

      <!-- Loader (unchanged) -->
      <div id="loader" class="bars" style="margin-top:16px; display:none;">
        <div class="bar" style="--i:1"></div>
        <div class="bar" style="--i:2"></div>
        <div class="bar" style="--i:3"></div>
        <div class="bar" style="--i:4"></div>
        <div class="bar" style="--i:5"></div>
        <div class="bar" style="--i:6"></div>
        <div class="bar" style="--i:7"></div>
        <div class="bar" style="--i:8"></div>
        <div class="bar" style="--i:9"></div>
      </div>
    </div>
  </div>

  <!-- Center Popup (same) -->
  <div class="popup" id="popup"></div>

  <!-- ✅ NEW FOOTER: exactly "Design by Pro Developing" with yellow -->
<footer class="fixed-footer">
  <div class="design-footer">
    Design by 
    <a href="https://www.prodeveloping.online" 
       target="_blank" 
       class="yellow-highlight" 
       style="text-decoration:none;">
       Pro Developing
    </a>
  </div>
</footer>

  <!-- Floating WhatsApp (optional but we keep same style as navbar) 
       we'll also add a floating one for consistency, positioned above footer -->
  <a id="waFloating" class="whatsapp-nav beat" href="#" style="position:fixed; right:16px; bottom: calc(var(--footer-height) + 16px); z-index:45; width:56px; height:56px; font-size:2rem;" title="Chat on WhatsApp">
    <i class="fa-brands fa-whatsapp"></i>
  </a>

  <script>
    // WhatsApp number and message (same as before)
    const waNumber = '916356952788';
    const waMessage = encodeURIComponent('Hello! I am using your YouTube Thumbnail Downloader 😊');

    function setupWhatsApp(linkId) {
      const el = document.getElementById(linkId);
      if (el) {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          window.open(`https://wa.me/${waNumber}?text=${waMessage}`, '_blank');
        });
      }
    }
    setupWhatsApp('waTop');
    setupWhatsApp('waFloating');

    // popup function
    function showPopup(message) {
      const popup = document.getElementById('popup');
      popup.textContent = message;
      popup.style.display = 'block';
      clearTimeout(popup._hideTimeout);
      popup._hideTimeout = setTimeout(() => {
        popup.style.display = 'none';
      }, 2500);
    }

    function extractVideoID(url) {
      const regExp = /^.*(?:youtu.be\/|v\/|embed\/|watch\?v=|watch\?.+&v=)([^#&?]{11}).*/;
      const match = url.match(regExp);
      return match ? match[1] : null;
    }

    async function downloadThumbnail() {
      const loader = document.getElementById('loader');
      const url = document.getElementById('videoUrl').value.trim();
      const quality = document.getElementById('quality').value;

      if (!url) {
        return showPopup('⚠️ Please enter a YouTube URL first!');
      }

      const videoId = extractVideoID(url);
      if (!videoId) {
        return showPopup('⚠️ Invalid YouTube URL');
      }

      loader.style.display = 'flex';
      try {
        const imageUrl = `https://img.youtube.com/vi/${videoId}/${quality}.jpg`;
        const response = await fetch(imageUrl);
        if (!response.ok) throw new Error('Not found');
        const blob = await response.blob();
        const downloadUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = `${videoId}_${quality}.jpg`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(downloadUrl);
        showPopup('✅ Thumbnail downloaded successfully!');
      } catch (err) {
        showPopup('❌ Download failed.');
      } finally {
        loader.style.display = 'none';
      }
    }
  </script>
</body>
    </html>
