    <!-- ===== SCRIPTS ===== -->
    <script>
        (function() {
            // Navbar scroll effect
            const nav = document.getElementById('mainNav');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) nav.classList.add('scrolled');
                else nav.classList.remove('scrolled');
            });

            // Hamburger toggle
            const hamburger = document.getElementById('hamburgerBtn');
            const navLinksMobile = document.getElementById('navLinksMobile');

            hamburger.addEventListener('click', function(e) {
                e.stopPropagation();
                navLinksMobile.classList.toggle('show');
                const icon = this.querySelector('i');
                icon.classList.toggle('fa-bars');
                icon.classList.toggle('fa-times');
            });

            document.querySelectorAll('#navLinksMobile a').forEach(link => {
                link.addEventListener('click', function() {
                    navLinksMobile.classList.remove('show');
                    const icon = hamburger.querySelector('i');
                    icon.classList.add('fa-bars');
                    icon.classList.remove('fa-times');
                });
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('nav') && navLinksMobile.classList.contains('show')) {
                    navLinksMobile.classList.remove('show');
                    const icon = hamburger.querySelector('i');
                    icon.classList.add('fa-bars');
                    icon.classList.remove('fa-times');
                }
            });
        })();

        // ===== CUSTOM DROPDOWN LOGIC =====
        (function() {
            const selected = document.getElementById('selectedOption');
            const dropdown = document.getElementById('dropdownOptions');
            const options = dropdown.querySelectorAll('.option');
            let currentValue = 'maxresdefault';

            // Toggle dropdown
            selected.addEventListener('click', function(e) {
                e.stopPropagation();
                dropdown.classList.toggle('open');
                const arrow = this.querySelector('.arrow i');
                if (dropdown.classList.contains('open')) {
                    arrow.className = 'fas fa-chevron-up';
                } else {
                    arrow.className = 'fas fa-chevron-down';
                }
            });

            // Select option
            options.forEach(opt => {
                opt.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const val = this.dataset.value;
                    const label = this.textContent.trim();
                    const iconHtml = this.querySelector('i') ? this.querySelector('i').outerHTML : '';

                    // Update selected display
                    selected.innerHTML = `
                        ${iconHtml}
                        <span>${label}</span>
                        <span class="arrow"><i class="fas fa-chevron-down"></i></span>
                    `;

                    // Update active class
                    options.forEach(o => o.classList.remove('active'));
                    this.classList.add('active');

                    currentValue = val;

                    // Close dropdown
                    dropdown.classList.remove('open');
                    const arrow = selected.querySelector('.arrow i');
                    if (arrow) arrow.className = 'fas fa-chevron-down';
                });
            });

            // Close dropdown on outside click
            document.addEventListener('click', function(e) {
                const container = document.getElementById('qualitySelect');
                if (!container.contains(e.target)) {
                    dropdown.classList.remove('open');
                    const arrow = selected.querySelector('.arrow i');
                    if (arrow) arrow.className = 'fas fa-chevron-down';
                }
            });

            // Getter for current value
            window.getQualityValue = function() {
                return currentValue;
            };
        })();

        // ===== THUMBNAIL DOWNLOADER LOGIC =====
        function showPopup(message) {
            const popup = document.getElementById('popup');
            popup.textContent = message;
            popup.style.display = 'block';
            clearTimeout(popup._hideTimeout);
            popup._hideTimeout = setTimeout(() => {
                popup.style.display = 'none';
            }, 2500);
        }

        function extractVideoID(url) {
            const regExp = /^.*(?:youtu.be\/|v\/|embed\/|watch\?v=|watch\?.+&v=)([^#&?]{11}).*/;
            const match = url.match(regExp);
            return match ? match[1] : null;
        }

        async function downloadThumbnail() {
            const loader = document.getElementById('loader');
            const url = document.getElementById('videoUrl').value.trim();
            const quality = window.getQualityValue();

            if (!url) {
                return showPopup('⚠️ Please enter a YouTube URL first!');
            }

            const videoId = extractVideoID(url);
            if (!videoId) {
                return showPopup('⚠️ Invalid YouTube URL');
            }

            loader.style.display = 'flex';
            try {
                const imageUrl = `https://img.youtube.com/vi/${videoId}/${quality}.jpg`;
                const response = await fetch(imageUrl);
                if (!response.ok) throw new Error('Not found');
                const blob = await response.blob();
                const downloadUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `${videoId}_${quality}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(downloadUrl);
                showPopup('✅ Thumbnail downloaded successfully!');
            } catch (err) {
                showPopup('❌ Download failed. Try another quality.');
            } finally {
                loader.style.display = 'none';
            }
        }

        // Enter key support
        document.getElementById('videoUrl').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                downloadThumbnail();
            }
        });
    </script>

</body>
</html>
